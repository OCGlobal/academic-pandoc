src:
  - changed-files:
      - any-glob-to-any-file:
          - .gitattributes
          - .gitignore
          - src/**/*

docs:
  - changed-files:
      - any-glob-to-any-file:
          - CODE_OF_CONDUCT.md
          - CONTRIBUTING.md
          - LICENSE.md
          - README.md
          - SECURITY.md
          - _config.yml
          - _layouts/**/*
          - android-chrome-192x192.png
          - android-chrome-512x512.png
          - apple-touch-icon.png
          - assets/**/*
          - favicon-16x16.png
          - favicon-32x32.png
          - favicon.ico
          - site.webmanifest

github:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
