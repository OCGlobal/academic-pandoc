name: Render Quarto

on: [workflow_dispatch, pull_request]

permissions:
  contents: read

jobs:
  render:
    name: Render Document
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
      - name: Install Quarto Extensions
        run: cd thesis && quarto install extension pandoc-ext/multibib --no-prompt
      - name: Check for linting errors
        run: npm run check
      - name: Render Quarto artifacts
        run: npm run render
